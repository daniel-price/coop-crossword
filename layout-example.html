<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Layout Example</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            padding: 20px;
            background-color: #f5f5f5;
        }

        .container {
            display: inline-flex;
            flex-direction: column;
            gap: 20px;
            max-width: 100%;
        }

        header {
            background-color: #e3f2fd;
            border: 2px solid #2196f3;
            padding: 20px;
            width: 100%;
        }

        .boxes-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(0, 700px));
            gap: 20px;
            width: max-content;
            max-width: 100%;
        }

        .box {
            background-color: #fff3e0;
            border: 2px solid #ff9800;
            padding: 20px;
            min-width: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Header</h1>
            <p>This header spans the full width of the Box 1 and Box 2 container.</p>
        </header>
        
        <div class="boxes-container">
            <div class="box">
                <h2>Box 1</h2>
                <p>Maximum width: 700px</p>
                <p>This box takes up available space and is responsive to the page width.</p>
            </div>
            
            <div class="box">
                <h2>Box 2</h2>
                <p>Same width as Box 1</p>
                <p>This box sits side-by-side with Box 1 when there's room, otherwise it stacks below.</p>
            </div>
        </div>
    </div>
</body>
</html>
