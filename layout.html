<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Layout</title>
    <style>
        .crossword-page {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content-wrapper {
            display: inline-grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 700px));
            gap: 20px;
            max-width: 100%;
        }

        header {
            border: 2px solid #333;
            grid-column: 1 / -1;
        }

        .crossword-container {
            display: contents;
        }

        .crossword-part {
            border: 2px solid #666;
        }
    </style>
</head>
<body>
    <div class="crossword-page">
        <div class="content-wrapper">
            <header>
                <h1>HEADER</h1>
            </header>
            <div class="crossword-container">
                <div class="crossword-part">
                    <h2>BOX 1</h2>
                    <p>This is Box 1 with a maximum width of 700px. It's responsive and will shrink on smaller screens.</p>
                </div>
                <div class="crossword-part">
                    <h2>BOX 2</h2>
                    <p>This is Box 2 with the same width as Box 1. It will stack below Box 1 when there's not enough room.</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
